version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: taskflow-postgres
    ports:
      - "5437:5432"
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
      POSTGRES_DB: taskflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
